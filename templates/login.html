{% extends "base.html" %}
{% block title %}Sign In · ScolarReach{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-16">

  <!-- Decorative blobs -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute -top-24 -left-24 w-[440px] h-[440px] rounded-full
                bg-sage/10 blur-3xl"></div>
    <div class="absolute bottom-10 right-0 w-[340px] h-[340px] rounded-full
                bg-amber/8 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm">

    <!-- Header -->
    <div class="mb-8 fade-up">
      <span class="rule-amber mb-4"></span>
      <h1 class="font-display text-4xl text-ink leading-tight">
        Welcome<br><em>back.</em>
      </h1>
      <p class="text-ink/60 mt-2 text-sm">Sign in to continue your research journey.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lifted p-8 fade-up-2">

      {% if error %}
      <div class="mb-5 bg-red-50 border border-red-200 rounded-lg px-4 py-3
                  text-sm text-red-700 flex items-center gap-2">
        <span>⚠</span> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}" novalidate class="space-y-5">

        <!-- Email -->
        <div>
          <label for="email" class="block text-xs font-semibold text-ink/70 uppercase tracking-widest mb-1.5">
            Email Address
          </label>
          <input id="email" name="email" type="email" required
                 value="{{ request.form.get('email', '') }}"
                 placeholder="you@school.edu"
                 class="w-full bg-parch border border-parch-dark rounded-lg px-4 py-2.5
                        text-sm text-ink placeholder:text-ink/30 transition-colors" />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-xs font-semibold text-ink/70 uppercase tracking-widest mb-1.5">
            Password
          </label>
          <input id="password" name="password" type="password" required
                 placeholder="••••••••"
                 class="w-full bg-parch border border-parch-dark rounded-lg px-4 py-2.5
                        text-sm text-ink placeholder:text-ink/30 transition-colors" />
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full bg-amber hover:bg-amber-light text-white font-semibold
                       py-3 rounded-xl transition-colors shadow-card text-sm mt-2
                       active:scale-[.98]">
          Sign In →
        </button>
      </form>
    </div>

    <!-- Register link -->
    <p class="text-center text-sm text-ink/50 mt-6 fade-up-3">
      New to ScolarReach?
      <a href="{{ url_for('register') }}" class="text-amber font-semibold hover:underline">
        Create an account
      </a>
    </p>

  </div>
</section>
{% endblock %}
