{% extends "base.html" %}
{% block title %}404 Not Found · ScolarReach{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-6">
  <span class="font-display text-[120px] leading-none text-parch-dark select-none">404</span>
  <h1 class="font-display text-2xl text-ink mt-2 mb-2">Page Not Found</h1>
  <p class="text-ink/50 text-sm mb-8 max-w-xs">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <a href="{{ url_for('index') }}"
     class="bg-ink hover:bg-ink-light text-parch font-semibold text-sm
            px-6 py-2.5 rounded-full transition-colors">
    ← Go home
  </a>
</div>
{% endblock %}
